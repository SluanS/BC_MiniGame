<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canibais e missionários</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/javascript/logic.js" defer></script>
</head>
<body>
    <div class="background">
        <header>
            <nav>
                <a href="#"><img class="logo" src="/images/logo.png" alt=""></a>
                <a href="#"><img src="/images/menu-icon.png" alt=""></a>
                <div class="theme">
                    <img src="/images/theme-icon/alien-theme.png" alt="">
                    <img src="/images/theme-icon/angel-theme.png" alt="">
                    <img src="/images/theme-icon/witch-theme.png" alt="">
                </div>
                <div class="tip">?</div>
            </nav>
        </header>
        <h1>Ajude-os a atravessar</h1>
        <div class="position" id="position1"><img class="char" id="char1" src="/images/characters/Drake.gif" alt=""></div>
        <div class="position" id="position2"><img class="char" id="char2" src="/images/characters/Jefrey.gif" alt=""></div>
        <div class="position" id="position3"><img class="char" id="char3" src="/images/characters/Canibal Lecter.gif" alt=""></div>
        <div class="position" id="position4"><img class="char" id="char4" src="/images/characters/Nun.gif" alt=""></div>
        <div class="position" id="position5"><img class="char" id="char5" alt="" src="/images/characters/Cardial.gif"></div>
        <div class="position" id="position6"><img class="char" id="char6" alt="" src="/images/characters/Pope.gif"></div>
        <div class="position" id="position7"></div>
        <div class="position" id="position8"></div>
        <div class="position" id="position9"></div>
        <div class="position" id="position10"></div>
        <div class="position" id="position12"></div>
        <div class="position" id="position11"></div>
        <div class="interactive-div">
            <div class="boat"><img src="/images/characters/Barco-gif.gif" alt=""></div>
            <div class="boat-position" id="bp1"></div>
            <div class="boat-position" id="bp2"></div>
        </div>
    </div> 
    <div class="controll">
        <img onclick="sendBoat()" class="pointer-left" src="/images/controls/pointer-left.png" alt="">
        <img class="central-circle"src="/images/controls/central-circle.png" alt="">
        <img onclick="sendBoat()" class="pointer-right"src="/images/controls/pointer-right.png" alt="">
    </div>
</body>
</html>
